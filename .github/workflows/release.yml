name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build app bundle
        run: bash scripts/build-app.sh ${{ steps.version.outputs.VERSION }}

      - name: Zip app bundle
        run: ditto -c -k --keepParent OpenScribe.app OpenScribe-${{ steps.version.outputs.VERSION }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: OpenScribe ${{ steps.version.outputs.VERSION }}
          files: OpenScribe-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
          body: |
            ## Installation

            1. Download `OpenScribe-${{ steps.version.outputs.VERSION }}.zip`
            2. Unzip and move `OpenScribe.app` to your Applications folder
            3. First launch: right-click → Open (macOS Gatekeeper — app is not notarized)

            **Requires macOS 13 Ventura or later.**
