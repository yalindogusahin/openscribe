name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: swift build

      - name: Build tests
        run: swift build --build-tests

      - name: Run tests
        run: |
          BUNDLE=.build/arm64-apple-macosx/debug/OpenScribePackageTests.xctest
          xcrun xctest -XCTest "OpenScribeTests.LoopRegionTests" "$BUNDLE"
          xcrun xctest -XCTest "OpenScribeTests.PlayerViewModelTests" "$BUNDLE"
